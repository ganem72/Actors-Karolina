<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bracket de Atores</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;text-align:center}
h1{padding:16px}
.wrap{display:flex;justify-content:center;gap:12px;padding:12px;flex-wrap:wrap}
.card{background:#222;border-radius:14px;overflow:hidden;width:45%;min-width:160px;cursor:pointer}
.card img{width:100%;height:280px;object-fit:cover}
.card h2{font-size:18px;padding:8px}
button{padding:10px 18px;margin:20px}
</style></head><body>
<h1>Quem é o ator mais bonito?</h1><div id="status"></div><div id="app" class="wrap"></div>
<script>
const actors=[
["Henry Cavill","https://commons.wikimedia.org/wiki/Special:FilePath/Henry_Cavill_by_Gage_Skidmore.jpg"],
["Chris Evans","https://commons.wikimedia.org/wiki/Special:FilePath/Chris_Evans_by_Gage_Skidmore_2.jpg"],
["Brad Pitt","https://commons.wikimedia.org/wiki/Special:FilePath/Brad_Pitt_2019.jpg"],
["Ryan Gosling","https://commons.wikimedia.org/wiki/Special:FilePath/Ryan_Gosling_Cannes_2011.jpg"],
["Mark Ruffalo","https://commons.wikimedia.org/wiki/Special:FilePath/Mark_Ruffalo_%2848428523956%29.jpg"],
["Gerard Butler","https://commons.wikimedia.org/wiki/Special:FilePath/Gerard_Butler_2018.jpg"],
["Harrison Ford","https://commons.wikimedia.org/wiki/Special:FilePath/Harrison_Ford_by_Gage_Skidmore.jpg"],
["Liam Neeson","https://commons.wikimedia.org/wiki/Special:FilePath/Liam_Neeson_2012.jpg"]];
let round=[...actors],next=[],i=0;
function draw(){
 if(round.length==1){app.innerHTML=`<div><h2>🏆 ${round[0][0]}</h2><img src="${round[0][1]}" style="max-width:90%;border-radius:12px"><br><button onclick="location.reload()">Recomeçar</button></div>`;status.textContent="Campeão";return;}
 if(i>=round.length){round=next;next=[];i=0;}
 status.textContent=`Confronto ${i/2+1} de ${round.length/2}`;
 let a=round[i],b=round[i+1];
 app.innerHTML=`<div class=card onclick='pick(0)'><img src='${a[1]}'><h2>${a[0]}</h2></div><div class=card onclick='pick(1)'><img src='${b[1]}'><h2>${b[0]}</h2></div>`;
}
function pick(x){next.push(round[i+x]);i+=2;draw();}
draw();
</script></body></html>
