<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato de Atores</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 10px;
}

h1 {
    font-size: 20px;
    margin: 15px 0;
}

.stage {
    color: #00e676;
    margin-bottom: 10px;
    font-weight: bold;
}

.bracket {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.match {
    background: #1e1e1e;
    padding: 12px;
    border-radius: 12px;
    width: 95%;
    max-width: 420px;
}

.duel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

.actor {
    width: 48%;
    cursor: pointer;
    padding: 10px;
    border-radius: 12px;
    background: #2a2a2a;
    transition: 0.2s;
}

.actor:hover {
    background: #333;
}

.actor img {
    width: 120px;
    height: 120px;
    border-radius: 12px;
    object-fit: cover;
    border: 2px solid #444;
}

.name {
    margin-top: 6px;
    font-size: 12px;
}

.vs {
    font-weight: bold;
    color: #00e676;
}

button {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #00e676;
    color: black;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🏆 Campeonato de Atores</h1>
<div class="stage" id="stage">Oitavas de Final</div>

<div class="bracket" id="bracket"></div>

<button onclick="start()">Reiniciar</button>

<script>

// 32 atores
const atores = [
"Henry Cavill","Chris Evans","Brad Pitt","Ryan Gosling",
"Gerard Butler","Russell Crowe","Jamie Dornan","Chad Michael Murray",
"Simon Baker","Mark Ruffalo","Tom Hardy","Theo James",
"Chris Hemsworth","Harrison Ford","Liam Neeson","Keanu Reeves",
"Leonardo DiCaprio","Robert Downey Jr.","Denzel Washington","Johnny Depp",
"Will Smith","Matt Damon","Jake Gyllenhaal","Christian Bale",
"Cillian Murphy","Benedict Cumberbatch","Morgan Freeman","Al Pacino",
"Robert De Niro","Tom Hanks","Ryan Reynolds","Joaquin Phoenix"
];

// 🖼️ Fotos reais (Wikimedia Commons)
function img(name) {
    const map = {
        "Henry Cavill":"https://upload.wikimedia.org/wikipedia/commons/8/8c/Henry_Cavill_%2848418512621%29.jpg",
        "Chris Evans":"https://upload.wikimedia.org/wikipedia/commons/6/6e/Chris_Evans_SDCC_2014.jpg",
        "Brad Pitt":"https://upload.wikimedia.org/wikipedia/commons/5/51/Brad_Pitt_Fury_2014.jpg",
        "Ryan Gosling":"https://upload.wikimedia.org/wikipedia/commons/6/66/Ryan_Gosling_in_2018.jpg",
        "Keanu Reeves":"https://upload.wikimedia.org/wikipedia/commons/5/53/Keanu_Reeves_2019.jpg",
        "Tom Hardy":"https://upload.wikimedia.org/wikipedia/commons/7/7a/Tom_Hardy_by_Gage_Skidmore.jpg",
        "Chris Hemsworth":"https://upload.wikimedia.org/wikipedia/commons/3/34/Chris_Hemsworth_2019.jpg",
        "Leonardo DiCaprio":"https://upload.wikimedia.org/wikipedia/commons/4/46/Leonardo_Dicaprio_Cannes_2019.jpg",
        "Robert Downey Jr.":"https://upload.wikimedia.org/wikipedia/commons/5/5a/Robert_Downey_Jr_2014_Comic_Con.jpg",
        "Johnny Depp":"https://upload.wikimedia.org/wikipedia/commons/3/3b/Johnny_Depp_2020.jpg",
        "Will Smith":"https://upload.wikimedia.org/wikipedia/commons/9/96/Will_Smith_2019_by_Glenn_Francis.jpg",
        "Matt Damon":"https://upload.wikimedia.org/wikipedia/commons/8/8d/Matt_Damon_TIFF_2015.jpg",
        "Christian Bale":"https://upload.wikimedia.org/wikipedia/commons/0/0a/Christian_Bale-7837.jpg",
        "Cillian Murphy":"https://upload.wikimedia.org/wikipedia/commons/3/3d/Cillian_Murphy_Berlinale_2017.jpg",
        "Tom Hanks":"https://upload.wikimedia.org/wikipedia/commons/a/a9/Tom_Hanks_TIFF_2019.jpg",
        "Morgan Freeman":"https://upload.wikimedia.org/wikipedia/commons/4/4f/Morgan_Freeman_BAFTA_2007.jpg",
        "Al Pacino":"https://upload.wikimedia.org/wikipedia/commons/9/98/Al_Pacino_2016.jpg",
        "Robert De Niro":"https://upload.wikimedia.org/wikipedia/commons/0/0b/Robert_De_Niro_Cannes_2016.jpg",
        "Denzel Washington":"https://upload.wikimedia.org/wikipedia/commons/0/0d/Denzel_Washington_2018.jpg",
        "Harrison Ford":"https://upload.wikimedia.org/wikipedia/commons/3/3a/Harrison_Ford_by_Gage_Skidmore.jpg",
        "Liam Neeson":"https://upload.wikimedia.org/wikipedia/commons/3/3e/Liam_Neeson_Deauville_2012.jpg"
    };

    return map[name] || "https://via.placeholder.com/200x200?text="+encodeURIComponent(name);
}

// estado do jogo
let current = [];
let next = [];
let index = 0;
let round = 0;

const stages = [
"Oitavas de Final",
"Quartas de Final",
"Semifinal",
"Final"
];

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function start(){
    current = shuffle([...atores]);
    next = [];
    index = 0;
    round = 0;

    document.getElementById("stage").innerText = stages[round];
    render();
}

function render(){
    const box = document.getElementById("bracket");
    box.innerHTML = "";

    if(current.length === 1){
        box.innerHTML = `
            <h2>🏆 CAMPEÃO</h2>
            <img src="${img(current[0])}" style="width:150px;height:150px;border-radius:12px">
            <h3>${current[0]}</h3>
        `;
        document.getElementById("stage").innerText = "Finalizado";
        return;
    }

    const a = current[index];
    const b = current[index+1];

    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
        <div class="duel">

            <div class="actor" onclick="win('${a}')">
                <img src="${img(a)}">
                <div class="name">${a}</div>
            </div>

            <div class="vs">VS</div>

            <div class="actor" onclick="win('${b}')">
                <img src="${img(b)}">
                <div class="name">${b}</div>
            </div>

        </div>
    `;

    box.appendChild(el);
}

function win(w){
    next.push(w);
    index += 2;

    if(index >= current.length){
        current = next;
        next = [];
        index = 0;
        round++;

        document.getElementById("stage").innerText = stages[round] || "Final";
    }

    render();
}

start();

</script>

</body>
</html>
