<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato de Atores</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 10px;
}

h1 {
    font-size: 20px;
    margin: 15px 0;
}

.stage {
    font-size: 14px;
    color: #00c853;
    margin-bottom: 10px;
}

.bracket {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.match {
    background: #222;
    padding: 12px;
    border-radius: 12px;
    width: 95%;
    max-width: 420px;
}

.duel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

.actor {
    width: 45%;
    cursor: pointer;
    padding: 8px;
    border-radius: 10px;
    transition: 0.2s;
}

.actor:hover {
    background: #333;
}

.actor img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #444;
}

.vs {
    font-weight: bold;
    color: #00c853;
}

button {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #00c853;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🏆 Campeonato de Atores</h1>
<div class="stage" id="stage">Oitavas de Final</div>

<div class="bracket" id="bracket"></div>

<button onclick="start()">Reiniciar Campeonato</button>

<script>

const atores = [
"Henry Cavill","Chris Evans","Brad Pitt","Ryan Gosling",
"Gerard Butler","Russell Crowe","Jamie Dornan","Chad Michael Murray",
"Simon Baker","Mark Ruffalo","Tom Hardy","Theo James",
"Chris Hemsworth","Harrison Ford","Liam Neeson","Keanu Reeves",
"Leonardo DiCaprio","Robert Downey Jr.","Denzel Washington","Johnny Depp",
"Will Smith","Matt Damon","Jake Gyllenhaal","Christian Bale",
"Joaquin Phoenix","Cillian Murphy","Benedict Cumberbatch","Morgan Freeman",
"Al Pacino","Robert De Niro","Tom Hanks","Ryan Reynolds"
];

function img(name) {
    return `https://picsum.photos/seed/${encodeURIComponent(name)}/200/200`;
}

let currentRound = [];
let nextRound = [];
let matchIndex = 0;
let stageIndex = 0;

const stages = [
"Oitavas de Final",
"Quartas de Final",
"Semifinal",
"Final"
];

function shuffle(a) {
    return a.sort(() => Math.random() - 0.5);
}

function start() {
    currentRound = shuffle([...atores]);
    nextRound = [];
    matchIndex = 0;
    stageIndex = 0;

    document.getElementById("stage").innerText = stages[stageIndex];
    renderMatch();
}

function renderMatch() {
    const container = document.getElementById("bracket");
    container.innerHTML = "";

    if (currentRound.length === 1) {
        container.innerHTML = `
            <h2>🏆 Campeão</h2>
            <img src="${img(currentRound[0])}" style="width:120px;height:120px;border-radius:50%">
            <h3>${currentRound[0]}</h3>
        `;
        document.getElementById("stage").innerText = "Campeão definido!";
        return;
    }

    const a = currentRound[matchIndex];
    const b = currentRound[matchIndex + 1];

    const match = document.createElement("div");
    match.className = "match";

    match.innerHTML = `
        <div class="duel">

            <div class="actor" onclick="pickWinner('${a}')">
                <img src="${img(a)}">
                <div>${a}</div>
            </div>

            <div class="vs">VS</div>

            <div class="actor" onclick="pickWinner('${b}')">
                <img src="${img(b)}">
                <div>${b}</div>
            </div>

        </div>
    `;

    container.appendChild(match);
}

function pickWinner(winner) {
    nextRound.push(winner);
    matchIndex += 2;

    if (matchIndex >= currentRound.length) {
        currentRound = nextRound;
        nextRound = [];
        matchIndex = 0;
        stageIndex++;

        document.getElementById("stage").innerText =
            stages[stageIndex] || "Final";

    }

    renderMatch();
}

start();

</script>

</body>
</html>
